name: Publish Ocelot Web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/web.yml'
      - 'app-web/**'
      - 'src/**'
      - 'web/**'
      - 'package.yaml'
      - '*.cabal'
      - 'Makefile'
      - 'stack.yaml'
      - 'stack.yaml.lock'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install wasm toolchain prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip zstd

      - name: Cache GHC wasm toolchain
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: ~/.ghc-wasm
          key: ${{ runner.os }}-ghc-wasm-9.6

      - name: Install GHC wasm toolchain
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: curl https://gitlab.haskell.org/haskell-wasm/ghc-wasm-meta/-/raw/master/bootstrap.sh | FLAVOUR=9.6 sh

      - name: Expose GHC wasm toolchain
        run: ~/.ghc-wasm/add_to_github_path.sh

      - name: Build web bundle
        run: make web-build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

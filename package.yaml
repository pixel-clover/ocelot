name:                ocelot
version:             0.1.0.0
github:              "pixel-clover/ocelot"
license:             MIT
author:              "Hassan Abedi"
maintainer:          "hassan.abedi@obsidian.systems"
copyright:           "2026 Hassan Abedi"

extra-source-files:
  - README.md
  - LICENSE

synopsis:            A Game Boy and Game Boy Color emulator in Haskell
category:            Emulator
description:         Please see the README on GitHub at <https://github.com/pixel-clover/ocelot#readme>

dependencies:
  - base >= 4.14 && < 5
  - text >= 1.2 && < 3

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

executables:
  ocelot:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - ocelot

tests:
  ocelot-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - ocelot
      - hspec >= 2.7 && < 3
      - QuickCheck >= 2.14 && < 3

name: ocelot
version: 0.1.0.0
github: "pixel-clover/ocelot"
license: MIT
author: "Hassan Abedi"
maintainer: "hassan.abedi.t+ocelot@gmail.com"
copyright: "2026 Hassan Abedi"

extra-source-files:
  - README.md
  - LICENSE
  - web/**

synopsis: A Game Boy and Game Boy Color emulator in Haskell
category: Emulator
description: Please see the README on GitHub at <https://github.com/pixel-clover/ocelot#readme>

dependencies:
  - base >= 4.14 && < 5
  - bytestring >= 0.11 && < 0.13
  - containers >= 0.6 && < 0.8
  - text >= 1.2 && < 3
  - time >= 1.11 && < 1.13
  - transformers >= 0.5 && < 0.7
  - vector >= 0.13 && < 0.14

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints
  - -O2

library:
  source-dirs: src

executables:
  ocelot:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - ocelot
      - optparse-applicative >= 0.18 && < 0.20
      - sdl2 >= 2.5 && < 2.6

  ocelot-web:
    main: Main.hs
    source-dirs: app-web
    dependencies:
      - ocelot

tests:
  ocelot-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - ocelot
      - directory >= 1.3 && < 1.4
      - filepath >= 1.4 && < 1.6
      - hspec >= 2.7 && < 3
      - QuickCheck >= 2.14 && < 3

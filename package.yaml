name: ocelot
version: 0.1.0.0
github: "pixel-clover/ocelot"
license: MIT
author: "Hassan Abedi"
maintainer: "hassan.abedi.t+ocelot@gmail.com"
copyright: "2026 Hassan Abedi"

extra-source-files:
  - README.md
  - LICENSE
  - web/**

synopsis: A Gameboy and Gameboy Color emulator in Haskell
category: Emulator
description: Please see the README on GitHub at <https://github.com/pixel-clover/ocelot#readme>

flags:
  desktop:
    description: Build the SDL desktop executable
    manual: true
    default: true
  wasm-reactor:
    description: Build the web executable as a WASI reactor module
    manual: true
    default: false

dependencies:
  - base >= 4.14 && < 5
  - bytestring >= 0.11 && < 0.13
  - containers >= 0.6 && < 0.8
  - githash >= 0.1 && < 0.2
  - text >= 1.2 && < 3
  - time >= 1.11 && < 1.13
  - transformers >= 0.5 && < 0.7
  - vector >= 0.13 && < 0.14

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints
  - -O2

library:
  source-dirs: src
  when:
    - condition: flag(wasm-reactor)
      ghc-options:
        - -fexternal-interpreter

executables:
  ocelot:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - ocelot
    when:
      - condition: flag(desktop)
        dependencies:
          - directory >= 1.3 && < 1.4
          - filepath >= 1.4 && < 1.6
          - gitrev >= 1.3 && < 1.4
          - JuicyPixels >= 3.3 && < 3.4
          - optparse-applicative >= 0.18 && < 0.20
          - sdl2 >= 2.5 && < 2.6
          - zip-archive >= 0.4 && < 0.5
      - condition: "!flag(desktop)"
        buildable: false

  ocelot-web:
    main: Main.hs
    source-dirs: app-web
    dependencies:
      - ocelot
    when:
      - condition: flag(wasm-reactor)
        ghc-options:
          - -no-hs-main
          - -optl-mexec-model=reactor
          - -optl-Wl,--export=hs_init
          - -optl-Wl,--export=ocelot_alloc
          - -optl-Wl,--export=ocelot_free
          - -optl-Wl,--export=ocelot_create
          - -optl-Wl,--export=ocelot_destroy
          - -optl-Wl,--export=ocelot_run_frame
          - -optl-Wl,--export=ocelot_set_button
          - -optl-Wl,--export=ocelot_framebuffer_ptr
          - -optl-Wl,--export=ocelot_framebuffer_len
          - -optl-Wl,--export=ocelot_audio_buffer_ptr
          - -optl-Wl,--export=ocelot_audio_buffer_len
          - -optl-Wl,--export=ocelot_clear_audio_buffer
          - -optl-Wl,--export=ocelot_save_state
          - -optl-Wl,--export=ocelot_save_state_ptr
          - -optl-Wl,--export=ocelot_save_state_len
          - -optl-Wl,--export=ocelot_load_state
          - -optl-Wl,--export=ocelot_extract_save
          - -optl-Wl,--export=ocelot_save_buffer_ptr
          - -optl-Wl,--export=ocelot_save_buffer_len
          - -optl-Wl,--export=ocelot_load_save
          - -optl-Wl,--export=ocelot_rom_title_ptr
          - -optl-Wl,--export=ocelot_rom_title_len
          - -optl-Wl,--export=ocelot_cartridge_has_battery
          - -optl-Wl,--export=ocelot_is_cgb
          - -optl-Wl,--export=ocelot_version_ptr
          - -optl-Wl,--export=ocelot_version_len
          - -optl-Wl,--export=ocelot_last_error_ptr
          - -optl-Wl,--export=ocelot_last_error_len
          - -optl-Wl,--export=ocelot_framebuffer_width
          - -optl-Wl,--export=ocelot_framebuffer_height
          - -optl-Wl,--export=ocelot_audio_sample_rate
          - -optl-Wl,--export=ocelot_button_up
          - -optl-Wl,--export=ocelot_button_down
          - -optl-Wl,--export=ocelot_button_left
          - -optl-Wl,--export=ocelot_button_right
          - -optl-Wl,--export=ocelot_button_a
          - -optl-Wl,--export=ocelot_button_b
          - -optl-Wl,--export=ocelot_button_start
          - -optl-Wl,--export=ocelot_button_select

tests:
  ocelot-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - ocelot
      - directory >= 1.3 && < 1.4
      - filepath >= 1.4 && < 1.6
      - hspec >= 2.7 && < 3
      - QuickCheck >= 2.14 && < 3
